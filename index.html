<html lang="en">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --border: #2e2e4e;
      --text: #e8e8f0;
      --muted: #888aaa;
      --entertain: #f7c948;
      --scold:     #ff6b6b;
      --motivate:  #4ecdc4;
      --meme:      #a78bfa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, #f7c948, #ff6b6b, #4ecdc4, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    header p {
      color: var(--muted);
      font-size: 1rem;
      margin-top: .5rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);

      gap: 1rem;
      width: 100%;
      max-width: 560px;
      margin-bottom: 2rem;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 1.1rem 1rem;
      font-family: 'Poppins', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
    }
    .btn span.emoji { font-size: 1.8rem; }
    .btn:hover  { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .btn:active { transform: translateY(0);    box-shadow: none; opacity: .85; }

    .btn-entertain { background: linear-gradient(135deg, #f7c948, #f0a500); color: #1a1200; }
    .btn-scold     { background: linear-gradient(135deg, #ff6b6b, #c0392b); color: #fff; }
    .btn-motivate  { background: linear-gradient(135deg, #4ecdc4, #1abc9c); color: #003530; }
    .btn-meme      { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; }
    .btn-lonely    { background: linear-gradient(135deg, #f9a8d4, #ec4899); color: #4a0020; grid-column: span 2; }

    /* Output card */
    #output {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      min-height: 180px;
      max-height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: border-color .3s;
      position: relative;
    }

    #output.has-content { animation: pop .3s ease; }
    @keyframes pop {
      0%   { transform: scale(.96); opacity: .5; }
      100% { transform: scale(1);   opacity: 1;  }
    }

    #output .label {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: .8rem;
      opacity: .7;
    }
    #output .message {
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 500;
      line-height: 1.65;
    }
    #output .sub {
      font-size: .85rem;
      color: var(--muted);
      margin-top: .6rem;
    }
    #output img {
      max-width: 100%;
      max-height: 360px;
      border-radius: 12px;
      margin-top: .8rem;
    }
    #output .placeholder {
      color: var(--muted);
      font-size: 1rem;
    }
    #output .loader {
      width: 36px; height: 36px;
      border: 4px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: .8rem;
      text-align: center;
    }
    footer a { color: var(--muted); }
  </style>
</head>

    { msg: `You replied to a group email with 'thanks!'

    { msg: `You estimated '2 days' and it's been a week.

    { msg: `You skipped writing the ticket description because 'everyone knows what this is.'

    { msg: `You've been in 'heads down mode' for 3 weeks.

    { msg: `You wrote the ticket title but left the description blank.

    { msg: `You attended the retrospective and said everything was fine.

    { msg: `You agreed to a deadline you knew was impossible.

    { msg: `Your code has no tests.

    { msg: `You asked the same question in three different Slack channels.

    { msg: `That technical debt you said you'd address 'next sprint'?

    { msg: `You deployed without telling anyone.

    { msg: `You copied that code from Stack Overflow without reading what it does.

    { msg: `You have been saying 'I'll refactor this later' since Q1.

    { msg: `Your local environment is a snowflake.

    { msg: `You hard-coded the API key.

    { msg: `You have 3 WIP items in the sprint.

    { msg: `You escalated to leadership before trying to resolve it with the other team directly.

    { msg: `You spent 4 hours making the internal dashboard look beautiful.

    { msg: `Your standup update was 8 minutes.

    { msg: `You merged without squashing.

    { msg: `You used a global variable where a local one would do.

    { msg: `You reviewed that PR in 45 seconds.

    { msg: `The client's message has been on read for 2 days.

    { msg: `You said 'we can definitely do that' in a client call without checking first.

    { msg: `You have 4 browser profiles.

    { msg: `You scheduled a meeting for a problem that could have been solved with a shared doc.

    { msg: `You sent a message that said 'can I ask you something?'

    { msg: `Your function does 7 things.

    { msg: `You used a Boolean where an enum would have made everything clearer.

    { msg: `You skipped the code review because 'it was a small change.'

    { msg: `You said you'd send the meeting notes.

    { msg: `You're checking your phone during 1-on-1s.

    { msg: `You keep saying you'll document the architecture 'when things calm down.'

    { msg: `You gave feedback that was vague.

    { msg: `You promised a delivery date without building in any buffer.

    { msg: `You wrote a 400-word Slack message.

    { msg: `You pushed a hotfix without writing a postmortem.

    { msg: `You gave an estimate without breaking the work down first.

    { msg: `You attended the design review but didn't read the designs beforehand.

    { msg: `You haven't replied to that Slack message and it's been 48 hours.

    { msg: `You said 'LGTM' on a PR that had an obvious naming inconsistency.

    { msg: `You have 12 browser tabs of documentation open.

    { msg: `You've been saying 'we should do a knowledge transfer' for 3 months.

    { msg: `Your PR description just says 'fixes bug.'

    { msg: `You keep context-switching every 20 minutes.

    { msg: `You've been 'thinking about' giving that feedback for 3 weeks.

    { msg: `You wrote a unit test that tests the mock, not the code.

    { msg: `You joined the retrospective, said nothing, and then complained about the same issues in a side conversation after.

  motivate: [

    { msg: `You didn't understand that concept today.

    { msg: `You don't have to know everything.

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function setCard(html, color) {
  const out = document.getElementById('output');
  out.style.borderColor = color + '66';
  out.innerHTML = html;
  out.classList.remove('has-content');
  void out.offsetWidth; // reflow for animation
  out.classList.add('has-content');
}

function memeSearchBar() {
  return `
    <div style="margin-top:.9rem;width:100%;display:flex;gap:.5rem;max-width:400px">
      <input id="meme-q" type="text" placeholder="🔍 search any meme…"
        style="flex:1;padding:.45rem .8rem;border-radius:10px;border:1px solid #2e2e4e;
               background:#0f0f1a;color:#e8e8f0;font-family:inherit;font-size:.85rem;outline:none"
        onkeydown="if(event.key==='Enter')searchMeme(this.value)" />
      <button onclick="searchMeme(document.getElementById('meme-q').value)"
        style="padding:.45rem 1rem;border-radius:10px;border:none;background:#a78bfa;
               color:#fff;font-family:inherit;font-weight:600;cursor:pointer;font-size:.85rem">
        Go
      </button>
    </div>`;
}

async function fetchAndShowMeme(query, color = COLORS.meme) {
  const out = document.getElementById('output');
  out.style.borderColor = color + '66';
  // show loader
  out.innerHTML = `<div class="loader"></div>`;
  out.classList.remove('has-content');

  let shown = false;
  try {
    const res = await fetch(
      `https://g.tenor.com/v1/random?q=${encodeURIComponent(query)}&key=LIVDSRZULELA&limit=20&media_filter=minimal`
    );
    if (res.ok) {
      const json = await res.json();
      const results = json?.results || [];
      if (results.length) {
        const gif = pick(results);
        const gifUrl = gif?.media?.[0]?.gif?.url || gif?.media?.[0]?.mediumgif?.url;
        if (gifUrl) {
          out.innerHTML = `
            <div class="label" style="color:${color}">🎬 GIF</div>
            <img src="${escHtml(gifUrl)}" alt="GIF" style="max-height:260px;border-radius:10px" />
            ${memeSearchBar()}
          `;
          void out.offsetWidth;
          out.classList.add('has-content');
          shown = true;
        }
      }
    }
  } catch (_) {}

  if (!shown) {
    const kdramaMemes = window._kdramaMemes;
    const item = pick(kdramaMemes);
    out.innerHTML = `
      <div class="label" style="color:${color}">🎬 K-drama moment</div>
      <p class="message">${escHtml(item.msg).replace(/\n/g, '<br/>')}</p>
      ${item.sub ? `<p class="sub">— ${escHtml(item.sub)}</p>` : ''}
      ${memeSearchBar()}
    `;
    void out.offsetWidth;
    out.classList.add('has-content');
  }
}

async function searchMeme(query) {
  if (!query || !query.trim()) return;
  await fetchAndShowMeme(query.trim());
}

  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
